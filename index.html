<!DOCTYPE html>
<html lang="en">

<head>
    <title>Search</title>
</head>

<body>
    <img src="" alt="">
    <form action="https://www.google.com/search">
             <h1 class="logo">
                <span class="g1">G</span><span class="o1">o</span><span class="o2">o</span><span class="g2">g</span><span class="l">l</span><span class="e">e</span>
            </h1>
        <input type="text" class="custom-input" name="q">
        <div>
            <input class="button" type="submit" value="Google Search">
            
            <a class="button" href="https://doodles.google/">I'm Feeling Lucky</a>
        </div>

    </form>
</body>

</html>

        <style>
            body {
                margin: 0;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: Arial, sans-serif;
                background-color: #ffffff;
            }

            form {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 18px; 
                width: 100%;
                max-width: 584px; 
                padding: 0 20px;
                box-sizing: border-box;
            }

            .logo {
                font-size: 80px; 
                font-weight: 500;
                letter-spacing: -2.5px;
                margin: 0 0 10px 0;
                user-select: none;
            }

            .g1 { color: #4285F4; }
            .o1 { color: #EA4335; }
            .o2 { color: #FBBC05; }
            .g2 { color: #4285F4; }
            .l  { color: #34A853; }
            .e  { color: #EA4335; }
       
            .custom-input {
                width: 100%;
                height: 46px; 
                padding: 0 16px;
                font-size: 16px;
                border: 1px solid #dfe1e5;
                border-radius: 24px;
                outline: none;
                box-sizing: border-box;
                transition: box-shadow 0.2s;
            }

    .custom-input:hover,
    .custom-input:focus {
        box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
        border-color: rgba(223, 225, 229, 0);
    }

    input[type="submit"] {
        background-color: #f8f9fa;
        border: 1px solid #f8f9fa;
        border-radius: 4px;
        color: #3c4043;
        font-size: 14px;
        padding: 0 16px;
        height: 36px;
        min-width: 120px;
        cursor: pointer;
    }

    input[type="submit"]:hover {
        border: 1px solid #dadce0;
        color: #202124;
        background-color: #f8f9fa;
        box-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
    }

    .button {
        background-color: #f8f9fa;
        border: 1px solid #f8f9fa;
        border-radius: 4px;
        color: #3c4043;
        font-size: 14px;
        padding: 0 16px;
        height: 36px;
        min-width: 120px;
        cursor: pointer;
        margin: 4px
    }
    a{
        text-decoration: none;
        display: inline-block;
        text-align: center;
        line-height: 36px;
    }
</style>
