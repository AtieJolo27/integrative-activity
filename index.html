<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Google Search</title>
 
        
        <style>

            .images{
                display: flex;
                justify-content: end;
                margin-right: 50px;
            }
            a{
                text-decoration: none;
                display: inline-block;
                color: #202124;
                font-family: Arial, sans-serif;
                font-size: small;
            }

            a:hover{
                text-decoration: underline;
            }
            .search {
                margin: 0;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: Arial, sans-serif;
                background-color: #ffffff;
            }

            form {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 18px; 
                width: 100%;
                max-width: 584px; 
                padding: 0 20px;
                box-sizing: border-box;
            }
       
            .custom-input {
                width: 100%;
                height: 46px; 
                padding: 0 16px;
                font-size: 16px;
                border: 1px solid #dfe1e5;
                border-radius: 24px;
                outline: none;
                box-sizing: border-box;
                transition: box-shadow 0.2s;
            }

            .custom-input:hover, 
            .custom-input:focus {
                box-shadow: 0 1px 6px rgba(32,33,36,0.28);
                border-color: rgba(223,225,229,0);
            }

            input[type="submit"] {
                background-color: #f8f9fa;
                border: 1px solid #f8f9fa;
                border-radius: 4px;
                color: #3c4043;
                font-size: 14px;
                padding: 0 16px;
                height: 36px;
                min-width: 120px;
                cursor: pointer;
            }

            input[type="submit"]:hover {
                border: 1px solid #dadce0;
                color: #202124;
                background-color: #f8f9fa;
                box-shadow: 0 1px 1px rgba(0,0,0,0.1);
            }
        </style>

    </head>

    <body>

        <div class="images">
            <a href="https://www.google.com/images" aria-label="Search for Images">Images</a>
        </div>

        <div class="search">
            <form action="https://www.google.com/search">
            <input type="text"  class="custom-input" name="q">
            <input type="submit" value="Google Search">
        </form>
        </div>
        

    </body>

</html>
