<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Advanced Search</title>


</head>
<body>

<div class="header">

<div class="logo">
<span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
</div>

</div>

<div class="container">

<h2 class="subtitle">Find pages with</h2>

<form action="https://www.google.com/search" method="GET">

<div class="form-row">
<label>All these words:</label>
<input type="text" name="as_q">
</div>

<div class="form-row">
<label>This exact word or phrase:</label>
<input type="text" name="as_epq">
</div>

<div class="form-row">
<label>Any of these words:</label>
<input type="text" name="as_oq">
</div>

<div class="form-row">
<label>None of these words:</label>
<input type="text" name="as_eq">
</div>

<div class="form-row">
<label>Site or domain:</label>
<input type="text" name="as_sitesearch">
</div>

<div class="form-row">
<label>File type:</label>

<select name="as_filetype">
<option value="">Any format</option>
<option value="pdf">Adobe Acrobat PDF (.pdf)</option>
<option value="doc">Microsoft Word (.doc)</option>
<option value="docx">Microsoft Word (.docx)</option>
<option value="xls">Microsoft Excel (.xls)</option>
<option value="xlsx">Microsoft Excel (.xlsx)</option>
<option value="ppt">Microsoft PowerPoint (.ppt)</option>
<option value="pptx">Microsoft PowerPoint (.pptx)</option>
<option value="txt">Text (.txt)</option>
<option value="rtf">Rich Text (.rtf)</option>
</select>

</div>

<div class="button-row">
<button type="submit">Advanced Search</button>
</div>

</form>

</div>

</body>
</html>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#fff;
    color:#202124;
}

.header{
    padding:20px 40px;
    border-bottom:1px solid #ebebeb;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#4285F4;
}

.logo span:nth-child(2){color:#EA4335;}
.logo span:nth-child(3){color:#FBBC05;}
.logo span:nth-child(4){color:#4285F4;}
.logo span:nth-child(5){color:#34A853;}
.logo span:nth-child(6){color:#EA4335;}

.container{
    padding:40px;
}

.title{
    color:#d93025;
    font-size:20px;
    margin-bottom:35px;
    font-weight:normal;
}

.subtitle{
    font-size:16px;
    margin-bottom:30px;
    padding-bottom:10px;
    border-bottom:1px solid #ebebeb;
}

form{
    width:100%;
    max-width:1000px;
}

.form-row{
    display:flex;
    align-items:center;
    margin-bottom:16px;
}

.form-row label{
    width:220px;
    font-size:13px;
    color:#202124;
}

.form-row input,
.form-row select{
    width:600px;
    height:30px;
    padding:5px 8px;
    font-size:13px;
    border:1px solid #d9d9d9;
    outline:none;
}

.form-row input:focus,
.form-row select:focus{
    border:1px solid #4285f4;
    box-shadow:inset 0 1px 2px rgba(0,0,0,.2);
}

.button-row{
    margin-left:220px;
    margin-top:30px;
}

button{
    background:#4d90fe;
    color:white;
    border:1px solid #3079ed;
    padding:8px 16px;
    font-size:11px;
    font-weight:bold;
    cursor:pointer;
    border-radius:2px;
}

button:hover{
    background:#357ae8;
}

</style>
